<style>
      
      *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
      html{
    scroll-behavior:smooth;
}

     body{
    margin:0;
    color:black;
    font-family:'Poppins',sans-serif;

    min-height:100vh;
    display:flex;
    flex-direction:column;

    background:
    radial-gradient(circle at top, rgba(255,0,0,0.08), transparent 40%),
    radial-gradient(circle at bottom, rgba(255,0,0,0.05), transparent 50%),
    #0b0b0b;
}
 header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 7%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    cursor:pointer;
    display:flex;
    flex-direction:column;
}

.movie-name{
    color:#ff1f1f;
    font-size:28px;
    font-weight:700;
}

.slogan{
    color:#999;
    font-size:12px;
}

.search-wrap{
    flex:1;
      width:60%;
    max-width:500px;
    margin:0 30px;
      position:relative;
}

#searchInput{
    width:100%;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #222;
    background:#121212;
    color:#fff;
    outline:none;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    color:#ddd;
    text-decoration:none;
    font-size:15px;
    position:relative;
    transition:0.3s ease;
    background:transparent;
    padding:0;
}

nav a:hover,
nav a.active{
    color:#ff1f1f;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-8px;
    width:0;
    height:2px;
    background:#ff1f1f;
    transition:0.3s ease;
}

nav a:hover::after,
nav a.active::after{
    width:100%;
}
      .links{
            background: transparent;
      }
  /* posters row */
  .posters-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 40px;
  justify-content: center;
  overflow-x: hidden;
}
      .poster-box{
  position:relative;
}

.view-btn{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  background:#E50914;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  opacity:0;
  transition:0.3s;
}

/* show button on hover */
.poster-box:hover .view-btn{
  opacity:1;
}

.poster-box img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:10px;
}
  .card{position:relative;width:160px;flex:0 0 160px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,0.04);transition:transform .22s ease,box-shadow .22s}
  .card img{display:block;width:100%;height:240px;object-fit:cover}
  .card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,0.6)}
  .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%, rgba(0,0,0,0.7));pointer-events:none}
  .meta{position:absolute;left:8px;bottom:8px;color:#fff;font-size:13px;pointer-events:none}
  .hover-buttons{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity .18s;pointer-events:none}
  .card:hover .hover-buttons{opacity:1;pointer-events:auto;background:rgba(0,0,0,0.45)}
  .btn{padding:8px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:700}
  .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.08)}
  .rating{color:#FFD700;margin-top:6px}

  /* footer */
  footer{background:var(--panel);text-align:center;padding:12px;color:var(--muted);font-size:14px}
  @media(max-width:600px){
    .card img{height:200px}
    .logo{font-size:18px}
  }
  .site-footer{
  margin-top:60px;
  background:#0f0f0f;
  color:#fff;
  padding:40px 20px;
  text-align:center;
  border-top:1px solid #222;
}

.footer-container{
  max-width:1000px;
  margin:auto;
}

.footer-logo{
  font-size:24px;
  margin-bottom:10px;
}

.footer-text{
  color:#bbb;
  margin-bottom:20px;
  line-height:1.6;
}

.footer-links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

.footer-links a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
  opacity:0.8;
  transition:0.3s;
}

.footer-links a:hover{
  opacity:1;
  color:red;
}

.footer-copy{
  font-size:13px;
  color:#777;
}

      /* suggestion box */
      .suggest-box{
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    margin-top: 6px;
    z-index: 1000;
    display: none;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.suggest-item{
    padding: 8px 12px;
    cursor: pointer;
    color: #e5e5e5;
    font-family: Arial, sans-serif;
    font-size: 14px;
    border-bottom: 1px solid #222;
    transition: background 0.2s ease;
}

.suggest-item:hover{
    background: #e50914;
    color: white;
}


.suggest-item:hover{
    background:#ff1f1f;
}

/////////////////////////////
/////////////////////////////
// ELEMENTS
/////////////////////////////

const postersRow = document.getElementById("postersRow");
const searchInput = document.getElementById("searchInput");
const suggestBox = document.getElementById("suggestBox");

/////////////////////////////
// RENDER MOVIES
/////////////////////////////

function renderMovies(list){

  postersRow.innerHTML = "";

  list.forEach(m => {

    postersRow.innerHTML += `
      <div class="card">
        <img src="${m.poster}" alt="${m.title}">

        <div class="meta">
          <h3>${m.title}</h3>
          <div>${m.date || ""}</div>
          <div>${"★".repeat(Math.round(m.rating || 0))}</div>
        </div>

        <div class="hover-buttons">
          <button class="btn" onclick="goTrailer(${m.id})">
            ▶ Read more...
          </button>
        </div>
      </div>
    `;
  });
}

/////////////////////////////
// INITIAL LOAD
/////////////////////////////

renderMovies(movies);

/////////////////////////////
// SEARCH ONLY (NO FILTER)
/////////////////////////////

searchInput.addEventListener("input", () => {

  const q = searchInput.value.toLowerCase();

  if(!q){
    suggestBox.style.display = "none";
    renderMovies(movies);
    return;
  }

  const filtered = movies.filter(m =>
    m.title.toLowerCase().includes(q)
  );

  renderMovies(filtered);

  const top = filtered.slice(0, 5);

  suggestBox.innerHTML = top.map(m => `
    <div class="suggest-item" onclick="selectMovie(${m.id})">
      ${m.title}
    </div>
  `).join("");

  suggestBox.style.display = top.length ? "block" : "none";
});

/////////////////////////////
// SELECT MOVIE
/////////////////////////////

function selectMovie(id){
  location.href = `trailer.html?id=${id}`;
}

/////////////////////////////
// CLOSE SUGGESTIONS
/////////////////////////////

document.addEventListener("click", e => {
  if(!e.target.closest(".search-wrap")){
    suggestBox.style.display = "none";
  }
});

/////////////////////////////
// ENTER SEARCH
/////////////////////////////

searchInput.addEventListener("keydown", e => {
  if(e.key === "Enter"){
    location.href = `poster.html?q=${encodeURIComponent(searchInput.value)}`;
  }
});

/////////////////////////////
// TRAILER NAV
/////////////////////////////

function goTrailer(id){
  location.href = `trailer.html?id=${id}`;
}
</script>
