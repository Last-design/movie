const params = new URLSearchParams(location.search);
const id = params.get("id") || movies[0].id;
const current = movies.find(m => String(m.id) === String(id)) || movies[0];

/* CLEAN ARTICLE (NO HEADERS) */
function loadMain(movie){
  document.getElementById("mainArea").innerHTML = `
    <img class="hero-poster" src="${movie.poster}">

    <h1 class="title">${movie.title}</h1>

    <p>${movie.summary}</p>

    <iframe class="video-frame" src="${movie.trailer}" allowfullscreen></iframe>

    <div class="article-text">
      ${movie.description}
    </div>
  `;
}

/* RECOMMENDATIONS */
function renderRecommendations(){
  const grid = document.getElementById("recGrid");

  movies
    .filter(m => String(m.id) !== String(current.id))
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${m.poster}">
        <p>${m.title}</p>
      `;

      div.onclick = () => {
        location.href = `trailer.html?id=${m.id}`;
      };

      grid.appendChild(div);
    });
}

loadMain(current);
renderRecommendations();
</script>
