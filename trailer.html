<style>
:root{

*{

body {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #0f0f0f;
  color: white;
}


/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 7%;
  background:rgba(0,0,0,0.85);

  font-size:22px;
  cursor:pointer;
}

nav{
  display:flex;

}

nav a{
  color:#ddd;

}

nav a.active{
  color:var(--accent);
}

/* MAIN */
.container{
  width:100%;
  max-width:100%;
  margin:80px 0 40px;
  padding:0 5%;
}



/* TITLE */
.title{
  font-size:40px;
  margin:20px 0;
}

/* TRAILER */
.video-frame{
  width:100%;
  height:70vh;
  border:none;
  border-radius:12px;
  margin-bottom:30px;
}

/* ARTICLE TEXT */
.article-text{
  font-size:18px;
  line-height:1.9;
  color:#e5e5e5;
  max-width:900px;
}

/* RECOMMENDATIONS */
#recGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-top:20px;
}

  .hero-wrapper{
  position:relative;
}

.hero-wrapper::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.85)
  );
}
 .hero-poster {
  width: 100%;
  height: 500px;        /* adjust if you want */
  object-fit: cover;
  display: block;
  border-radius: 0;     /* removes card look */
}

/* optional: full cinematic header feel */
#mainArea {
  width: 100%;
  max-width: 100%;

/* RESPONSIVE */
@media(max-width:900px){
  .hero-poster{height:260px;}
  .video-frame{height:260px;}
}
  .starring-section{
  margin:20px 0;
  padding:15px;
  border-radius:10px;
  background:#1a1a1a;
}

.starring-section h2{
  margin-bottom:10px;
}

.starring-section p{
  line-height:1.6;
}
  /* ARTICLE STYLE (like blog / Wikipedia feel) */
.article-text{
  font-family: "Georgia", serif;
  font-size: 18px;
  line-height: 1.9;
  color: #eaeaea;
  letter-spacing: 0.2px;
  margin: 20px 0;
}

/* Make paragraphs inside article better */
.article-text p{
  margin-bottom: 18px;
}

/* SUMMARY STYLE (modern / highlighted box) */
.summary-box{
  margin-top: 30px;
  padding: 15px;
  border-radius: 10px;
  background: #111;
  border-left: 4px solid #ffcc00;

/* SUMMARY TEXT (different font from article) */
.summary-text{
  font-family: "Arial", sans-serif;
  font-size: 17px;
  line-height: 1.6;
  color: #ccc;
  font-style: italic;

.summary-box h2{
  font-family: "Poppins", sans-serif;
  font-size: 20px;
  color: #fff;

  /* GRID CONTAINER */
.recommend-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin-top: 20px;

.recommend-card{
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  text-align: center;
}

.recommend-card:hover{
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* POSTER INSIDE CARD */
.recommend-card img{
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

/* TITLE */
.recommend-card h4{
  font-size: 14px;
  padding: 10px;
  color: #fff;
}
</style>
</head>

const params = new URLSearchParams(location.search);
const id = params.get("id");

const current =
  movies.find(m => String(m.id) === String(id)) || movies[0];

/* RECOMMENDATIONS */
function getRecommendations(currentId){
  return movies.filter(m => String(m.id) !== String(currentId));
}

/* MAIN LOADER */
function loadMain(movie){

  const recommendations = getRecommendations(movie.id);

  document.getElementById("mainArea").innerHTML = `
    <h1 class="title">${movie.title}</h1>

    <img class="hero-poster" src="${movie.poster}">

    <div class="movie-rating">
      ⭐ ${movie.rating}/5
    </div>

    <div class="article-text">
      ${movie.article}
    </div>

    <h2>Official Trailer</h2>

    <iframe class="video-frame"
      src="${movie.trailer}"
      allowfullscreen>
    </iframe>

    <div class="summary-box">
  <h2>Movie Summary</h2>
  <p class="summary-text">${movie.summary}</p>
</div>

    <div class="starring-section">
      <h2>Starring</h2>
      <p>${(movie.starring || []).join(", ")}</p>
    </div>

    <h2>Recommended Movies</h2>

    <div class="recommend-grid">
      ${recommendations.map(rec => `
        <div class="recommend-card" onclick="loadMain(movies.find(m => m.id === ${rec.id}))">
          <img src="${rec.poster}">
          <h4>${rec.title}</h4>
        </div>
      `).join("")}
    </div>
  `;
}

/* INIT PAGE */
loadMain(current);
</script>
