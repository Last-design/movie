<style>

  top:0;
  left:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;

nav{

  margin-top:20px;

  .hero-wrapper{

.hero-wrapper::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(

    rgba(0,0,0,0.2),
    rgba(0,0,0,0.85)

  width: 100%;

  padding:15px;

  background:#1a1a1a;

.starring-section h2{
  margin-bottom:10px;

.starring-section p{
  line-height:1.6;

  font-family: "Georgia", serif;
  font-size: 18px;
  line-height: 1.9;
  color: #eaeaea;
  letter-spacing: 0.2px;
  margin: 20px 0;

/* Make paragraphs inside article better */
.article-text p{
  margin-bottom: 18px;
}
  #main {
  padding: 20px;

.summary-box{
  margin-top: 30px;
  padding: 15px;
  border-radius: 10px;
  background: #111;
  border-left: 4px solid #ffcc00;

.summary-box h2{

.recommend-grid{

.recommend-card:hover{

/* POSTER INSIDE CARD */
.recommend-card img{
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

/* TITLE */
.recommend-card h4{
  font-size: 14px;
  padding: 10px;
  color: #fff;

</style>

/* ===================== URL ID ===================== */
const params = new URLSearchParams(location.search);
const id = params.get("id");

const current =
  movies.find(m => String(m.id) === String(id)) || movies[0];

/* ===================== RECOMMENDATIONS ===================== */
function getRecommendations(currentId){
  return movies.filter(m => String(m.id) !== String(currentId));
}

/* ===================== MAIN PAGE LOADER ===================== */
function loadMain(movie){

  const recommendations = getRecommendations(movie.id);

  document.getElementById("mainArea").innerHTML = `
    <div class="movie-page">

      <!-- TITLE -->
      <h1 class="title">${movie.title}</h1>

      <!-- POSTER -->
      <img class="hero-poster" src="${movie.poster}" alt="${movie.title}">

      <!-- RATING -->
      <div class="movie-rating">
        ⭐ ${movie.rating}/5
      </div>

      <!-- ARTICLE -->
      <div class="article-text">
        ${movie.article || ""}
      </div>

      <!-- TRAILER -->
      <h2 class="section-title">Official Trailer</h2>
      <iframe class="video-frame"
        src="${movie.trailer}"
        allowfullscreen>
      </iframe>

      <!-- SUMMARY -->
      <div class="summary-box">
        <h2 class="section-title">Movie Summary</h2>
        <p>${movie.summary || ""}</p>
      </div>

      <!-- STARRING -->
      <div class="starring-section">
        <h2 class="section-title">Starring</h2>
        <p>
          ${Array.isArray(movie.starring)
            ? movie.starring.join(", ")
            : movie.starring || "N/A"}
        </p>
      </div>

     <h2 class="section-title">Recommendation Movies</h2>
      <div class="recommend-grid">
        ${recommendations.map(rec => `
          <div class="recommend-card"
               onclick="loadMain(movies.find(m => m.id === ${rec.id}))">

            <img src="${rec.poster}" alt="${rec.title}">
            <h4>${rec.title}</h4>

          </div>
        `).join("")}
      </div>

    </div>
  `;
}

loadMain(current);

</script>
