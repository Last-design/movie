<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MoviePulse — Trailer</title>

<link rel="icon" type="image/png" href="moviepulse (2).png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --panel:#111;
  --accent:#E50914;
  --muted:#bdbdbd;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:#fff;
  min-height:100vh;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 7%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
  color:var(--accent);
  font-weight:700;
  font-size:22px;
  cursor:pointer;
}

nav{
  display:flex;
  gap:25px;
}

nav a{
  color:#ddd;
  text-decoration:none;
  position:relative;
  transition:0.3s;
}

nav a:hover,
nav a.active{
  color:var(--accent);
}

nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:var(--accent);
  transition:0.3s;
}

nav a:hover::after,
nav a.active::after{
  width:100%;
}

/* MAIN */
.container{
  max-width:1000px;
  margin:120px auto 40px;
  padding:20px;
}

.video-frame{
  width:100%;
  height:480px;
  border:none;
  border-radius:10px;
  background:black;
}

.title{
  font-size:28px;
  margin-bottom:12px;
}

.meta{
  margin-top:15px;
  color:var(--muted);
  line-height:1.6;
}

/* RECOMMENDATIONS */
#recommendations{
  margin-top:40px;
}

#recGrid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.card{
  width:150px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:8px;
  transition:0.3s;
}

.card img:hover{
  transform:scale(1.05);
}

.card p{
  font-size:13px;
  text-align:center;
  margin-top:6px;
  color:#ddd;
}

/* RESPONSIVE */
@media(max-width:900px){
  .video-frame{height:260px;}
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="location.href='index.html'">MoviePulse</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="poster.html">Movies</a>
    <a href="trailer.html" class="active">Trailer</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <div id="mainArea"></div>

  <section id="recommendations">
    <h3 style="margin-bottom:15px;">Recommended Movies</h3>
    <div id="recGrid"></div>
  </section>
</div>

<script>
const movies = [
  {
    id: 1,
    title: "Avatar: The Way of Water",
    poster: "https://i.pinimg.com/736x/b2/f8/43/b2f843111df8347133dca44dc2c5f57b.jpg",
    trailer: "https://www.youtube.com/embed/d9MyW72ELq0",
    date: 2022,
    description: "Jake Sully and Neytiri face new threats as they explore the oceans of Pandora."
  },
  {
    id: 2,
    title: "Spider-Man: No Way Home",
    poster: "https://i.pinimg.com/1200x/f7/93/cf/f793cf13f485432251c4a2e6bfc5e4a3.jpg",
    trailer: "https://www.youtube.com/embed/JfVOs4VSpmA",
    date: 2021,
    description: "Peter Parker’s identity is revealed, leading to multiverse chaos."
  },
  {
    id: 3,
    title: "John Wick 4",
    poster: "https://i.pinimg.com/1200x/6e/50/a0/6e50a0bb3202e05cb9de75978b50e4a7.jpg",
    trailer: "https://www.youtube.com/embed/qEVUtrk8_B4",
    date: 2023,
    description: "John Wick discovers a path to defeat The High Table."
  }
];

const params = new URLSearchParams(location.search);
const id = params.get("id") || movies[0].id;
const current = movies.find(m => String(m.id) === String(id)) || movies[0];

function loadMain(movie){
  document.getElementById("mainArea").innerHTML = `
    <h1 class="title">${movie.title}</h1>

    <iframe class="video-frame"
      src="${movie.trailer}"
      allowfullscreen>
    </iframe>

    <div class="meta">
      <strong>Release:</strong> ${movie.date || "N/A"} <br><br>
      <strong>Description:</strong><br>
      ${movie.description || "No description available."}
    </div>
  `;
}

function renderRecommendations(){
  const grid = document.getElementById("recGrid");

  movies
    .filter(m => String(m.id) !== String(current.id))
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${m.poster}">
        <p>${m.title}</p>
      `;

      div.onclick = () => {
        location.href = `trailer.html?id=${m.id}`;
      };

      grid.appendChild(div);
    });
}

loadMain(current);
renderRecommendations();
</script>

</body>
</html>
