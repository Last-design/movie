:root{

  left:0;

  display:flex;

.logo{
  color:var(--accent);
  font-weight:700;
  font-size:22px;

}

nav{
  display:flex;
  gap:25px;

nav a{
  color:#ddd;
  text-decoration:none;

nav a:hover,
nav a.active{
  color:var(--accent);

/* MAIN */

  max-width:900px;
  margin:120px auto 40px;
  padding:20px;
}

/* POSTER */
.hero-poster{
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

/* TITLE */
.title{
  font-size:32px;
  margin-bottom:15px;
}

/* TRAILER */
.video-frame{
  width:100%;
  height:460px;
  border:none;
  border-radius:10px;
  margin-bottom:20px;
}

/* ARTICLE TEXT */
.article-text{
  line-height:1.9;
  font-size:16px;
  color:#ddd;
  margin-bottom:25px;
}

/* RECOMMENDATIONS */
#recGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-top:10px;
}

.card{
  background:#111;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card p{
  padding:8px;
  font-size:13px;
  text-align:center;
  color:#ddd;
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero-poster{height:260px;}
  .video-frame{height:260px;}
}
</style>

  summary:`Crime 101 is one of those movies that immediately caught my attention because of its serious tone and the mystery surrounding its story. What I enjoyed most about the film is the way it combines crime, suspense, and action without feeling rushed. The story follows a series of highly organized jewel robberies that leave investigators searching for answers while the criminals stay one step ahead. Every new clue seems to reveal another secret, making it difficult to predict what will happen next.

One of the strongest aspects of the movie is the tension between the people enforcing the law and the criminals responsible for the robberies. The film constantly creates situations where both sides are trying to outsmart each other, making every encounter feel important. Instead of relying only on action scenes, the movie focuses on strategy, intelligence, and patience. This makes the story more engaging because viewers are encouraged to pay attention to details.

const params = new URLSearchParams(location.search);
const id = params.get("id") || movies[0].id;
const current = movies.find(m => String(m.id) === String(id)) || movies[0];

/* CLEAN ARTICLE (NO HEADERS) */
function loadMain(movie){
  document.getElementById("mainArea").innerHTML = `
    <img class="hero-poster" src="${movie.poster}">

    <h1 class="title">${movie.title}</h1>

    <p>${movie.summary}</p>

    <iframe class="video-frame" src="${movie.trailer}" allowfullscreen></iframe>

    <div class="article-text">
      ${movie.description}
    </div>
  `;
}

/* RECOMMENDATIONS */
function renderRecommendations(){
  const grid = document.getElementById("recGrid");

  movies
    .filter(m => String(m.id) !== String(current.id))
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${m.poster}">
        <p>${m.title}</p>
      `;

      div.onclick = () => {
        location.href = `trailer.html?id=${m.id}`;
      };

      grid.appendChild(div);
    });
}

loadMain(current);
renderRecommendations();
